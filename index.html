<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Jeremy Lourenco Rojas</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --muted: #6b6b6b;
    --accent: #111111;
    --border: #e4e4e4;
    --sidebar-width: 190px;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  .layout {
    display: flex;
    min-height: 100vh;
  }

  /* ---- Left column: name + collapsible nav ---- */
  .left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 40px 24px;
    flex-shrink: 0;
  }

  .name {
    line-height: 1.15;
    margin-bottom: 28px;
    white-space: nowrap;
  }

  .name .first-names {
    display: block;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .name .last-names {
    display: block;
    font-size: 22px;
    font-weight: 600;
    color: var(--muted);
  }

  .sidebar-wrap {
    display: flex;
    align-items: flex-start;
  }

  .toggle-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
    transition: background 0.15s ease;
  }

  .toggle-btn:hover {
    background: #f3f3f3;
  }

  .toggle-btn svg {
    width: 14px;
    height: 14px;
    transition: transform 0.3s ease;
  }

  /* arrow points right by default (closed state) */
  .toggle-btn svg {
    transform: rotate(0deg);
  }

  .layout.open .toggle-btn svg {
    transform: rotate(180deg);
  }

  .nav-column {
    max-width: 0;
    overflow: hidden;
    transition: max-width 0.3s ease, opacity 0.25s ease;
    opacity: 0;
  }

  .layout.open .nav-column {
    max-width: var(--sidebar-width);
    opacity: 1;
  }

  .nav-column nav {
    display: flex;
    flex-direction: column;
    padding-left: 14px;
    min-width: 140px;
  }

  .nav-column button.nav-item {
    background: none;
    border: none;
    text-align: left;
    font-size: 15px;
    padding: 8px 4px;
    margin: 0;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }

  .nav-column button.nav-item:hover {
    color: var(--text);
  }

  .nav-column button.nav-item.active {
    color: var(--text);
    font-weight: 600;
  }

  /* ---- Main content ---- */
  .content {
    flex: 1;
    padding: 40px 40px 40px 8px;
  }

  .tab-panel {
    display: none;
  }

  .tab-panel.active {
    display: block;
  }

  .tab-panel h1 {
    font-size: 20px;
    font-weight: 600;
    margin-top: 6px;
    margin-bottom: 16px;
  }

  .placeholder {
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="layout" id="layout">
  <div class="left">
    <div class="name">
      <span class="first-names">Mark Jeremy</span>
      <span class="last-names">Lourenco Rojas</span>
    </div>

    <div class="sidebar-wrap">
      <button class="toggle-btn" id="toggleBtn" aria-label="Toggle navigation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>

      <div class="nav-column">
        <nav>
          <button class="nav-item" data-tab="about">About</button>
          <button class="nav-item" data-tab="projects">Projects</button>
          <button class="nav-item" data-tab="resume">Resume</button>
        </nav>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="tab-panel" id="about">
      <h1>About</h1>
      <p class="placeholder">About content coming soon.</p>
    </div>

    <div class="tab-panel" id="projects">
      <h1>Projects</h1>
      <p class="placeholder">Projects content coming soon.</p>
    </div>

    <div class="tab-panel" id="resume">
      <h1>Resume</h1>
      <p class="placeholder">Resume content coming soon.</p>
    </div>
  </div>
</div>

<script>
  const layout = document.getElementById('layout');
  const toggleBtn = document.getElementById('toggleBtn');
  const navItems = document.querySelectorAll('.nav-item');
  const panels = document.querySelectorAll('.tab-panel');

  toggleBtn.addEventListener('click', () => {
    layout.classList.toggle('open');
  });

  function showTab(tabName) {
    panels.forEach(p => p.classList.toggle('active', p.id === tabName));
    navItems.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  }

  navItems.forEach(btn => {
    btn.addEventListener('click', () => showTab(btn.dataset.tab));
  });

  // Default: sidebar open, Projects tab active
  layout.classList.add('open');
  showTab('projects');
</script>

</body>
</html>
